<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureBank — Transfer Funds</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav bar ──────────────────────────────────────── */
    .nav {
      background: #1a3a5c;
      color: #fff;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9em;
      flex-shrink: 0;
    }
    .nav .logo    { font-weight: 700; font-size: 1.05em; }
    .nav .user    { margin-left: auto; opacity: 0.75; font-size: 0.82em; }
    .nav .dot     { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; }

    /* ── Content ─────────────────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px 28px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }

    .card-header {
      color: #1a3a5c;
      font-size: 1.1em;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 12px 0;
    }

    .amount {
      font-size: 2.2em;
      font-weight: 800;
      color: #e53e3e;
      letter-spacing: -0.5px;
    }

    .transfer-meta {
      color: #718096;
      font-size: 0.82em;
      margin: 8px 0 16px;
      line-height: 1.5;
    }

    .transfer-meta strong { color: #2d3748; }

    .btn-confirm {
      width: 100%;
      padding: 13px;
      background: #e53e3e;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 1em;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-confirm:hover { background: #c53030; }

    .warning {
      margin-top: 10px;
      color: #e53e3e;
      font-size: 0.75em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    /* ── Footer ──────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 8px;
      font-size: 0.7em;
      color: #a0aec0;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <span>🏦</span>
    <span class="logo">SecureBank</span>
    <span class="dot"></span>
    <span class="user">John Doe · Savings ••3421</span>
  </nav>

  <div class="content">
    <div class="card">
      <div class="card-header">Confirm Transfer</div>
      <div class="divider"></div>

      <div class="amount">$500.00</div>
      <div class="transfer-meta">
        From: <strong>Savings ••3421</strong><br />
        To: <strong>External account ••4892</strong><br />
        Reference: <strong>INV-2024-887</strong>
      </div>

      <button class="btn-confirm">Confirm Transfer</button>

      <div class="warning">
        <span>⚠️</span>
        <span>This action cannot be undone</span>
      </div>
    </div>
  </div>

  <div class="footer">SecureBank © 2024 — 256-bit SSL encrypted</div>
</body>
</html>
